manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: m165437
      url-base: https://github.com/M165437
  projects:
    # Board files are provided by THIS repo (zephyr/module.yml -> board_root: .),
    # so the upstream eyelash_corne pull is omitted for the v0.3 / nice_view_gem
    # experiment to avoid a duplicate board definition.
    - name: zmk
      remote: zmkfirmware
      revision: v0.3
      import: app/west.yml
    - name: nice-view-gem
      remote: m165437
      revision: v0.3.0
  self:
    path: config